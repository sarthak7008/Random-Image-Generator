<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🦊 Random Fox Gallery — Neon Edition</title>
    <style>
        /* ── Google Font ── */
        @import url("https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap");

        /* ── Reset & Base ── */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: #0b0e1a;
            color: #f0f4ff;
            font-family: "Roboto", sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 30px 20px 80px;
            position: relative;
            overflow-x: hidden;
        }

        /* ── Animated gradient overlay ── */
        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse at 20% 30%, rgba(88, 30, 255, 0.20) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 70%, rgba(0, 255, 200, 0.12) 0%, transparent 60%),
                radial-gradient(ellipse at 50% 100%, rgba(255, 0, 200, 0.08) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
            animation: ambientPulse 10s ease-in-out infinite alternate;
        }

        @keyframes ambientPulse {
            0% {
                opacity: 0.6;
                transform: scale(1);
            }
            100% {
                opacity: 1;
                transform: scale(1.05);
            }
        }

        /* ── Floating particles (stars) ── */
        #particles {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            width: 3px;
            height: 3px;
            background: rgba(255, 255, 255, 0.35);
            border-radius: 50%;
            animation: floatParticle linear infinite;
            box-shadow: 0 0 6px rgba(100, 200, 255, 0.25);
        }

        @keyframes floatParticle {
            0% {
                transform: translateY(100vh) scale(0.4);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(-10vh) scale(1.2);
                opacity: 0;
            }
        }

        /* ── Watermark ── */
        .watermark {
            position: fixed;
            bottom: 24px;
            right: 30px;
            z-index: 999;
            font-size: clamp(0.5rem, 0.85vw, 0.7rem);
            font-family: "Roboto", sans-serif;
            font-weight: 700;
            color: rgba(255, 255, 255, 0.15);
            letter-spacing: 1.5px;
            text-shadow: 0 0 20px rgba(122, 92, 255, 0.1);
            pointer-events: none;
            background: rgba(0, 0, 0, 0.3);
            padding: 8px 18px;
            border-radius: 40px;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.04);
            transition: opacity 0.5s ease;
        }

        .watermark span {
            background: linear-gradient(135deg, rgba(122, 92, 255, 0.6), rgba(0, 229, 200, 0.5));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .watermark .heart {
            display: inline-block;
            animation: heartBeat 2s ease-in-out infinite;
            -webkit-text-fill-color: rgba(255, 107, 203, 0.5);
            font-size: 0.8em;
        }

        @keyframes heartBeat {
            0%,
            100% {
                transform: scale(1);
            }
            15% {
                transform: scale(1.3);
            }
            30% {
                transform: scale(1);
            }
            45% {
                transform: scale(1.2);
            }
            60% {
                transform: scale(1);
            }
        }

        /* ── Header ── */
        .header {
            position: relative;
            z-index: 1;
            text-align: center;
            margin-bottom: 40px;
        }

        .header .title {
            font-size: clamp(2.2rem, 6vw, 4rem);
            font-weight: 700;
            background: linear-gradient(135deg, #a0f0ff, #7a5cff, #ff6bcb);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 40px rgba(122, 92, 255, 0.2);
            letter-spacing: 1px;
            margin-bottom: 6px;
        }

        .header .subtitle {
            font-size: clamp(0.8rem, 1.2vw, 1rem);
            color: rgba(255, 255, 255, 0.4);
            letter-spacing: 3px;
            font-weight: 400;
            text-transform: uppercase;
        }

        .header .subtitle span {
            display: inline-block;
            animation: shimmer 3s ease-in-out infinite;
            background: linear-gradient(135deg, #ff6bcb, #ffd76b, #7ae0ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        @keyframes shimmer {
            0%,
            100% {
                filter: hue-rotate(0deg);
            }
            50% {
                filter: hue-rotate(25deg);
            }
        }

        /* ── Refresh button ── */
        .refresh-btn {
            position: relative;
            z-index: 1;
            border: 2px solid #7a5cff;
            background: rgba(122, 92, 255, 0.12);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            color: #f0f4ff;
            padding: 14px 36px;
            font-family: "Roboto", sans-serif;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            border-radius: 60px;
            transition: all 0.35s ease;
            box-shadow: 0 0 30px rgba(122, 92, 255, 0.15), inset 0 0 30px rgba(122, 92, 255, 0.03);
            letter-spacing: 2px;
            margin-bottom: 35px;
            text-transform: uppercase;
        }

        .refresh-btn:hover {
            transform: translateY(-4px) scale(1.04);
            box-shadow: 0 0 50px rgba(122, 92, 255, 0.35), 0 0 80px rgba(0, 229, 200, 0.10);
            border-color: transparent;
            background: rgba(122, 92, 255, 0.25);
        }

        .refresh-btn:active {
            transform: scale(0.94);
        }

        .refresh-btn .icon {
            display: inline-block;
            transition: transform 0.6s ease;
        }

        .refresh-btn:hover .icon {
            transform: rotate(180deg);
        }

        /* ── Gallery Grid ── */
        .container {
            position: relative;
            z-index: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap;
            max-width: 1100px;
            gap: 20px;
            padding: 0 10px;
        }

        /* ── Fox Card ── */
        .fox-card {
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.35), 0 0 40px rgba(122, 92, 255, 0.03);
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            width: 280px;
            height: 280px;
            flex-shrink: 0;
            position: relative;
        }

        .fox-card::before {
            content: "";
            position: absolute;
            inset: 0;
            border-radius: 20px;
            padding: 2px;
            background: linear-gradient(135deg, rgba(122, 92, 255, 0.2), rgba(0, 229, 200, 0.15), rgba(255, 107, 203, 0.15));
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        .fox-card:hover::before {
            opacity: 1;
        }

        .fox-card:hover {
            transform: translateY(-10px) scale(1.02);
            box-shadow: 0 16px 60px rgba(122, 92, 255, 0.2), 0 0 80px rgba(0, 229, 200, 0.06);
            border-color: rgba(122, 92, 255, 0.2);
        }

        .fox-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: transform 0.5s ease, filter 0.4s ease;
            filter: saturate(0.9) brightness(0.95);
        }

        .fox-card:hover img {
            transform: scale(1.04);
            filter: saturate(1.1) brightness(1.02);
        }

        /* ── Loading shimmer ── */
        .fox-card.loading {
            background: rgba(255, 255, 255, 0.03);
            animation: cardPulse 1.8s ease-in-out infinite;
        }

        @keyframes cardPulse {
            0%,
            100% {
                opacity: 0.4;
            }
            50% {
                opacity: 0.8;
            }
        }

        /* ── Responsive ── */
        @media (max-width: 700px) {
            .container {
                gap: 14px;
            }
            .fox-card {
                width: 160px;
                height: 160px;
                border-radius: 14px;
            }
            .fox-card::before {
                border-radius: 14px;
            }
            .refresh-btn {
                padding: 12px 28px;
                font-size: 0.8rem;
            }
            .watermark {
                bottom: 14px;
                right: 16px;
                padding: 5px 12px;
                font-size: 0.4rem;
            }
        }

        @media (max-width: 400px) {
            .fox-card {
                width: 120px;
                height: 120px;
                border-radius: 12px;
            }
            .container {
                gap: 10px;
            }
            .refresh-btn {
                padding: 10px 20px;
                font-size: 0.7rem;
            }
        }

        /* ── Scrollbar styling ── */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #0b0e1a;
        }
        ::-webkit-scrollbar-thumb {
            background: #7a5cff;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #a07aff;
        }
    </style>
</head>
<body>

    <!-- ─── Particles ─── -->
    <div id="particles"></div>

    <!-- ─── WATERMARK ─── -->
    <div class="watermark">
        <span class="heart">✦</span>
        <span>made by Sarthak Deokar</span>
        <span class="heart">✦</span>
    </div>

    <!-- ─── HEADER ─── -->
    <header class="header">
        <h1 class="title">🦊 Random Foxes</h1>
        <p class="subtitle"><span>✦ each one is unique ✦</span></p>
    </header>

    <!-- ─── REFRESH BUTTON ─── -->
    <button class="refresh-btn" id="refreshBtn">
        <span class="icon">⟳</span> &nbsp;New Foxes
    </button>

    <!-- ─── GALLERY ─── -->
    <div class="container" id="galleryContainer"></div>

    <script>
        // ─── DOM refs ───
        const container = document.getElementById("galleryContainer");
        const refreshBtn = document.getElementById("refreshBtn");

        const RANDOM_FOX_URL = "https://randomfox.ca/images/";
        const IMAGE_COUNT = 15; // 5 rows × 3 columns
        const MAX_INDEX = 123;

        // ─── Particles ───
        (function createParticles() {
            const container = document.getElementById("particles");
            const count = 50;
            for (let i = 0; i < count; i++) {
                const p = document.createElement("div");
                p.className = "particle";
                p.style.left = Math.random() * 100 + "%";
                const size = 1 + Math.random() * 3;
                p.style.width = size + "px";
                p.style.height = size + "px";
                p.style.animationDuration = (10 + Math.random() * 30) + "s";
                p.style.animationDelay = (Math.random() * 25) + "s";
                p.style.opacity = 0.2 + Math.random() * 0.5;
                container.appendChild(p);
            }
        })();

        // ─── Get random number ───
        const getRandomNumber = () => Math.floor(Math.random() * MAX_INDEX);

        // ─── Build gallery ───
        function buildGallery() {
            // Clear with a fade effect
            container.style.opacity = "0";
            setTimeout(() => {
                container.innerHTML = "";

                // Create cards with loading state
                for (let i = 0; i < IMAGE_COUNT; i++) {
                    const card = document.createElement("div");
                    card.className = "fox-card loading";

                    const img = document.createElement("img");
                    const idx = getRandomNumber();
                    img.src = `${RANDOM_FOX_URL}${idx}.jpg`;
                    img.alt = `Random fox #${idx}`;
                    img.loading = "lazy";

                    // Image loaded → remove loading state
                    img.addEventListener("load", () => {
                        card.classList.remove("loading");
                    });

                    // If image fails, try a fallback
                    img.addEventListener("error", () => {
                        // retry with a different index
                        const fallbackIdx = getRandomNumber();
                        img.src = `${RANDOM_FOX_URL}${fallbackIdx}.jpg`;
                    });

                    card.appendChild(img);
                    container.appendChild(card);
                }

                // Fade back in
                setTimeout(() => {
                    container.style.opacity = "1";
                }, 80);
            }, 200);
        }

        // ─── Initial build ───
        buildGallery();

        // ─── Refresh button ───
        refreshBtn.addEventListener("click", () => {
            // button feedback
            refreshBtn.style.transform = "scale(0.92)";
            setTimeout(() => {
                refreshBtn.style.transform = "";
            }, 200);

            // rebuild with new images
            buildGallery();
        });

        // ─── Keyboard shortcut: 'R' to refresh ───
        document.addEventListener("keydown", (e) => {
            if (e.key === "r" || e.key === "R") {
                if (!e.ctrlKey && !e.metaKey) {
                    e.preventDefault();
                    refreshBtn.click();
                }
            }
        });

        // ─── Console easter egg ───
        console.log("🦊 Random Fox Gallery — Neon Edition");
        console.log("✦ made by Sarthak Deokar ✦");
        console.log("Press 'R' to refresh the foxes!");
    </script>
</body>
</html>
